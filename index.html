<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Espacial do Rover</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-Ce8OwVjJ.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-HIZStU8c.css">
</head>

<body>
    <div class="game-container">
        <header>
            <h1>Missão Espacial do Rover 🚀</h1>
            <div class="level-indicator">Planeta <span id="level-number">1</span></div>
        </header>

        <main class="main-content">
            <!-- Game Board (The Planet) -->
            <section class="board-section">
                <div id="game-board" class="game-board">
                    <!-- Grid cells will be generated by JS -->
                </div>
            </section>

            <!-- Programming Controls -->
            <section class="controls-section">
                <!-- Available Blocks Palette -->
                <div class="palette">
                    <h2>Comandos</h2>
                    <div class="blocks-container">
                        <div class="block cmd-block" data-type="forward" draggable="true">⬆️ Avançar</div>
                        <div class="block cmd-block" data-type="turn-left" draggable="true">⬅️ Virar Esquerda</div>
                        <div class="block cmd-block" data-type="turn-right" draggable="true">➡️ Virar Direita</div>
                        <div class="block logic-block logic-repeat" data-type="repeat" draggable="true">
                            Loop: Repetir <input type="number" min="1" max="9" value="2" class="repeat-count"> vezes
                            <div class="block-drop-zone"></div>
                        </div>
                        <div class="block logic-block logic-if" data-type="if" draggable="true">
                            Se
                            <select class="condition-select">
                                <option value="path-clear">caminho livre</option>
                                <option value="on-target">no alvo</option>
                            </select>
                            <div class="block-drop-zone true-zone"></div>
                            Senão
                            <div class="block-drop-zone false-zone"></div>
                        </div>
                    </div>
                </div>

                <!-- Program Area (Queue) -->
                <div class="program-area">
                    <h2>Seu Programa</h2>
                    <div id="program-queue" class="queue-container block-drop-zone main-queue">
                        <!-- Placed blocks will go here -->
                        <div class="empty-state">Arraste os comandos aqui</div>
                    </div>

                    <div class="action-buttons">
                        <button id="btn-clear" class="btn btn-secondary">🗑️ Limpar</button>
                        <button id="btn-run" class="btn btn-primary">🚀 Iniciar</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Victory Overlay -->
        <div id="victory-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>Missão Cumprida! 🌟</h2>
                <p>O Rover encontrou o cristal espacial!</p>
                <div class="rocket-animation">🚀</div>
                <button id="btn-next-level" class="btn btn-primary">Próximo Planeta</button>
            </div>
        </div>

        <!-- Crash Overlay -->
        <div id="crash-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>Oh não! 💥</h2>
                <p>O Rover bateu em uma cratera ou saiu do planeta!</p>
                <button id="btn-retry" class="btn btn-primary">Tentar Novamente</button>
            </div>
        </div>
    </div>

</body>

</html>
